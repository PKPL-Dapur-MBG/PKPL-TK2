{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md mt-10">
    <div class="mb-8 border-b pb-4">
        <h2 class="text-3xl font-bold text-gray-800">🎨 Pengaturan Tema</h2>
        <p class="text-gray-500 mt-2">Ubah warna latar dan jenis font website secara global.</p>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Warna Latar (Background)</label>
                <div class="flex items-center gap-4">
                    <input type="color" name="bg_color" value="{{ style.bg_color }}" class="h-12 w-24 rounded cursor-pointer border border-gray-300">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Warna Teks Utama</label>
                <div class="flex items-center gap-4">
                    <input type="color" name="text_color" value="{{ style.text_color|default:'#1f2937' }}" class="h-12 w-24 rounded cursor-pointer border border-gray-300">
                    <span class="text-gray-500 text-sm">Warna teks agar kontras dengan background.</span>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Warna Aksen Tombol</label>
                <div class="flex items-center gap-4">
                    <input type="color" name="secondary_color" value="{{ style.secondary_color }}" class="h-12 w-24 rounded cursor-pointer border border-gray-300">
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Warna Teks Dalam Tombol</label>
                <div class="flex items-center gap-4">
                    <input type="color" name="btn_text_color" value="{{ style.btn_text_color|default:'#ffffff' }}" class="h-12 w-24 rounded cursor-pointer border border-gray-300">
                    <span class="text-gray-500 text-sm">Teks di dalam tombol aksen.</span>
                </div>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Jenis Font (Font Family)</label>
            <select name="font_family" class="mt-1 block w-full pl-3 pr-10 py-3 text-base border-gray-300 focus:outline-none focus:ring-purple-500 focus:border-purple-500 sm:text-sm rounded-md border bg-gray-50">
                <option value="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" 
                    {% if 'ui-sans-serif' in style.font_family %}selected{% endif %}>
                    Modern Sans-Serif
                </option>
                <option value="ui-serif, Georgia, Cambria, 'Times New Roman', Times, serif" 
                    {% if 'ui-serif' in style.font_family or 'Times' in style.font_family %}selected{% endif %}>
                    Times New Roman / Georgia
                </option>
                <option value="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Courier New', monospace" 
                    {% if 'monospace' in style.font_family %}selected{% endif %}>
                    Monospace / Code (Courier New / Consolas)
                </option>
                <option value="'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif" 
                    {% if 'Trebuchet' in style.font_family %}selected{% endif %}>
                    Trebuchet MS
                </option>
            </select>
        </div>

        <div class="pt-6 flex gap-4">
            <button type="submit" class="w-full bg-accent hover-bg-accent text-white font-bold py-3 px-4 rounded-md shadow-sm transition">
                Simpan Perubahan
            </button>
            <a href="{% url 'home' %}" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-md shadow-sm text-center transition">
                Batal
            </a>
        </div>
    </form>
</div>
{% endblock %}
