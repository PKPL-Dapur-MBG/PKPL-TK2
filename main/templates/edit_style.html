{% extends 'base.html' %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-md mt-10">
    <div class="mb-8 border-b pb-4">
        <h2 class="text-3xl font-bold text-gray-800">🎨 Pengaturan Tema</h2>
        <p class="text-gray-500 mt-2">Ubah warna latar dan jenis font website secara global.</p>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Warna Latar Belakang (Hex)</label>
            <div class="flex items-center gap-4">
                <input type="color" name="bg_color" value="{{ style.bg_color }}" class="h-12 w-24 rounded cursor-pointer border border-gray-300">
                <span class="text-gray-500 text-sm">Pilih warna untuk background body website.</span>
            </div>
        </div>

        <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Jenis Font (Font Family)</label>
            <select name="font_family" class="mt-1 block w-full pl-3 pr-10 py-3 text-base border-gray-300 focus:outline-none focus:ring-purple-500 focus:border-purple-500 sm:text-sm rounded-md border bg-gray-50">
                <option value="ui-sans-serif, system-ui, sans-serif" {% if style.font_family == 'ui-sans-serif, system-ui, sans-serif' %}selected{% endif %}>Default (Sans-serif)</option>
                <option value="Arial, sans-serif" {% if style.font_family == 'Arial, sans-serif' %}selected{% endif %}>Arial</option>
                <option value="'Times New Roman', serif" {% if style.font_family == "'Times New Roman', serif" %}selected{% endif %}>Times New Roman</option>
                <option value="'Courier New', monospace" {% if style.font_family == "'Courier New', monospace" %}selected{% endif %}>Courier New (Monospace)</option>
            </select>
        </div>

        <div class="pt-6 flex gap-4">
            <button type="submit" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-4 rounded-md shadow-sm transition">
                Simpan Perubahan
            </button>
            <a href="{% url 'home' %}" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-4 rounded-md shadow-sm text-center transition">
                Batal
            </a>
        </div>
    </form>
</div>
{% endblock %}
