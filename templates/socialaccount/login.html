{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-20 bg-white p-8 rounded-2xl shadow-xl text-center border border-gray-100">
    
    <div class="w-20 h-20 mx-auto bg-gray-50 border-2 border-accent rounded-full flex items-center justify-center mb-6 shadow-sm">
        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google Logo" class="w-10 h-10">
    </div>
    
    <h2 class="text-2xl font-extrabold text-gray-900 mb-2">Konfirmasi Login</h2>
    
    <p class="text-gray-600 mb-8 leading-relaxed">
        Anda akan masuk menggunakan akun pihak ketiga dari Google. Lanjutkan?
    </p>
    
    <form method="post">
        {% csrf_token %}
        <div class="flex flex-col sm:flex-row gap-3 justify-center">
            <button type="submit" class="w-full sm:w-auto bg-accent hover-bg-accent text-white font-semibold py-2.5 px-8 rounded-lg shadow-md transition-all">
                Lanjutkan
            </button>
            <a href="{% url 'account_login' %}" class="w-full sm:w-auto bg-white border border-gray-300 hover:bg-gray-50 text-gray-700 font-semibold py-2.5 px-8 rounded-lg transition-all">
                Batal
            </a>
        </div>
    </form>
</div>
{% endblock %}
