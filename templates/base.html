{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dapur MBG - PKPL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <style>
        :root {
            --bg-color: {{ style.bg_color|default:"#f3f4f6" }};
            --text-color: {{ style.text_color|default:"#1f2937" }};
            --secondary-color: {{ style.secondary_color|default:"#4f46e5" }};
            --btn-text-color: {{ style.btn_text_color|default:"#ffffff" }};
            --font-family: {{ style.font_family|default:"ui-sans-serif, system-ui, sans-serif"|safe }};
        }
        
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            transition: all 0.3s ease;
        }

        .text-main { color: var(--text-color) !important; }

        .bg-accent { 
            background-color: var(--secondary-color) !important; 
            color: var(--btn-text-color) !important;
        }
        .text-accent { color: var(--secondary-color) !important; }
        .border-accent { border-color: var(--secondary-color) !important; }
        .hover-bg-accent:hover { filter: brightness(0.85); transition: 0.3s; }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    {% include "navbar.html" %}

    <main class="flex-grow w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    {% block scripts %}{% endblock %}
</body>
</html>
