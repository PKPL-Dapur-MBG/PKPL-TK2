{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-2xl shadow-xl border border-gray-100">
    <div class="text-center mb-8">
        <h2 class="text-3xl font-extrabold text-gray-900">Daftar Akun Baru</h2>
        <p class="text-gray-500 mt-2 text-sm">Isi data di bawah untuk bergabung dengan kami.</p>
    </div>

    <form class="signup" method="POST" action="{% url 'account_signup' %}">
        {% csrf_token %}
        <div class="text-sm font-medium text-gray-700 text-left">
            {{ form.as_p }}
        </div>
        
        <button type="submit" class="w-full bg-accent hover-bg-accent text-white font-bold py-3 px-4 rounded-lg shadow-md transition-colors mt-4">
            Daftar Sekarang
        </button>
    </form>

    <div class="mt-8 text-center text-sm text-gray-600">
        Sudah memiliki akun? 
        <a href="{% url 'account_login' %}" class="font-semibold text-accent hover:opacity-80 transition">Masuk di sini</a>
    </div>
</div>
{% endblock %}
